---
- name: Set VM facts
  ansible.builtin.set_fact:
    vm_name: "{{ template_parameters.vm_name }}"

- name: Get VirtualMachine info for floating IP cleanup
  kubernetes.core.k8s_info:
    api_version: kubevirt.io/v1
    kind: VirtualMachine
    name: "{{ vm_name }}"
    namespace: "{{ vm_target_namespace }}"
  register: vm_info

- name: Clean up floating IP (if exists)
  when:
    - vm_info.resources | length > 0
    - vm_info.resources[0].metadata.annotations is defined
    - vm_info.resources[0].metadata.annotations['cloudkit.openshift.io/floating-ip-address'] is defined
  block:
    - name: Delete floating IP port forwarding
      ansible.builtin.command: >-
        openstack esi port forwarding delete {{ vm_info.resources[0].metadata.annotations['cloudkit.openshift.io/floating-ip-address'] }}
      ignore_errors: true

    - name: Delete floating IP
      ansible.builtin.include_role:
        name: massopencloud.esi.floating_ip
        tasks_from: destroy_floating_ip
      vars:
        floating_ip_state: absent
        floating_ip_name: "{{ vm_info.resources[0].metadata.annotations['cloudkit.openshift.io/floating-ip-name'] | default(vm_name + '-floating-ip') }}"
        floating_ip_network: "{{ vm_info.resources[0].metadata.annotations['cloudkit.openshift.io/floating-ip-network'] | default('external') }}"

- name: Stop VirtualMachine
  kubernetes.core.k8s:
    api_version: kubevirt.io/v1
    kind: VirtualMachine
    name: "{{ vm_name }}"
    namespace: "{{ vm_target_namespace }}"
    state: present
    definition:
      spec:
        running: false

- name: Wait for VM to stop
  kubernetes.core.k8s_info:
    api_version: kubevirt.io/v1
    kind: VirtualMachine
    name: "{{ vm_name }}"
    namespace: "{{ vm_target_namespace }}"
    wait: true
    wait_condition:
      type: Ready
      status: "False"
    wait_timeout: 300

- name: Delete VirtualMachine
  kubernetes.core.k8s:
    api_version: kubevirt.io/v1
    kind: VirtualMachine
    name: "{{ vm_name }}"
    namespace: "{{ vm_target_namespace }}"
    state: absent
    wait: true
    wait_timeout: 300

- name: Delete VM service (if it exists)
  kubernetes.core.k8s:
    api_version: v1
    kind: Service
    name: "{{ vm_name }}-service"
    namespace: "{{ vm_target_namespace }}"
    state: absent

- name: Delete VM load balancer service
  kubernetes.core.k8s:
    api_version: v1
    kind: Service
    name: "{{ vm_name }}-load-balancer"
    namespace: "{{ vm_target_namespace }}"
    state: absent

- name: Delete root disk DataVolume
  kubernetes.core.k8s:
    api_version: cdi.kubevirt.io/v1beta1
    kind: DataVolume
    name: "{{ vm_name }}-root-disk"
    namespace: "{{ vm_target_namespace }}"
    state: absent
    wait: true
    wait_timeout: 300

- name: Delete cloud-init secret
  kubernetes.core.k8s:
    api_version: v1
    kind: Secret
    name: "{{ vm_name }}-cloud-init"
    namespace: "{{ vm_target_namespace }}"
    state: absent
  ignore_errors: true

- name: Display deletion status
  ansible.builtin.debug:
    msg:
      - "Virtual Machine '{{ vm_name }}' deletion completed"
      - "Namespace: {{ vm_target_namespace }}"
      - "All associated resources have been removed"
